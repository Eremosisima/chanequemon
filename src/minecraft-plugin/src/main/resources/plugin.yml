name: Chanequemon
version: 1.1.0
main: com.chanequemon.ChanequemonPlugin
api-version: 1.21
author: Erendira Raquel Perales Perez
description: "Chanequemon — Capture mythological creatures using the Lemegeton of Solomon. Turn-based RPG. Defensive publication."
website: https://github.com/eremosisima/Chanequemon
commands:
  chanequemon:
    description: "Comando principal de Chanequemon"
    usage: "/chanequemon <list|captured|curse|books|invocar|regresar|dismiss>"
    aliases: [chm]
permissions:
  chanequemon.use:
    description: "Permite usar comandos de Chanequemon"
    default: true
